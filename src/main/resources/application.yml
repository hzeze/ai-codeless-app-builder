spring:
  application:
    name: ai-codeless-app-builder-backend
  # DataSource Config
  datasource:
    url: jdbc:mysql://localhost:3306/ai_codeless_app_builder
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  # redis
  data:
    redis:
      host: localhost
      port: 6379
      username: default
      password: 123456
      ttl: 3600
  # session
  session:
    store-type: redis
    # session过期时间 30天
    timeout: 2592000
  profiles:
    active: local
server:
  port: 8123
  servlet:
    context-path: /api
    # cookie过期时间 30天
    session:
      cookie:
        max-age: 2592000
# springdoc-openapi
springdoc:
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.hz.aicodelessappbuilder.controller
# knife4j
knife4j:
  enable: true
  setting:
    language: zh_cn
# actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
# AI
langchain4j:
  open-ai:
    chat-model:
      base-url: https://api.deepseek.com
      api-key: <Your api key>
      model-name: deepseek-chat
      #      strict-json-schema: true
      #      response-format: json_object
      log-requests: true
      log-responses: true
    streaming-chat-model:
      base-url: https://api.deepseek.com
      api-key: <Your api key>
      model-name: deepseek-chat
      max-tokens: 8192
      log-requests: true
      log-responses: true
# 添加 COS 对象存储配置（腾讯云）
cos:
  client:
    host: <Your host>
    secretId: <Your secretId>
    secretKey: <Your secretKey>
    region: <Your region>
    bucket: <Your bucket>
